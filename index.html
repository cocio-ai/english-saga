<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英単語サ・ガ：大学入試編</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=PixelMplus10&display=swap" rel="stylesheet">
    
    <script>
        window.onerror = function(msg, url, line) {
            document.body.innerHTML = '<div style="color:#fff; padding:20px; font-size:18px; text-align:center; margin-top:50px;"><b>【システムエラー発生】</b><br><br><span style="color:#e74c3c;">' + msg + '</span><br><br>行番号: ' + line + '行目付近</div>';
            return false;
        };
    </script>

    <style>
        :root {
            --romasaga-blue-dark: #000033;
            --romasaga-gold: #daa520;
            --romasaga-gold-light: #f1c40f;
            --romasaga-cyan: #66ccff;
            /* 全体的にドットフォントを適用してレトロ感を底上げ */
            --font-main: 'DotGothic16', sans-serif;
            --font-pixel: 'PixelMplus10', sans-serif;
        }

        body {
            font-family: var(--font-main); background-color: #000; color: #fff;
            text-align: center; margin: 0; padding: 10px; image-rendering: pixelated;
        }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        /* ▼▼▼ ロマサガ完全再現の極太多重枠ウィンドウ ▼▼▼ */
        .window {
            background-color: var(--romasaga-blue-dark);
            border: 3px solid #fff; /* 1層目：内側の白い太線 */
            box-shadow: 
                0 0 0 3px #000, /* 2層目：間の黒い太線 */
                0 0 0 6px #fff; /* 3層目：外側の白い太線 */
            padding: 20px; 
            margin: 15px 8px 25px 8px; /* 外側の枠が切れないように余白を確保 */
            text-align: left; position: relative;
        }

        /* モード説明ヘッダー（分かりやすさ改善） */
        .mode-header { border-bottom: 2px dashed #555; margin-bottom: 15px; padding-bottom: 10px; }
        .mode-title-text { color: var(--romasaga-gold-light); font-size: 22px; margin-bottom: 5px; font-weight: bold; }
        .mode-desc-text { color: #ccc; font-size: 13px; line-height: 1.4; }

        #title-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 80vh; }
        .game-title { font-family: var(--font-main); font-size: 44px; color: var(--romasaga-gold-light); text-shadow: 3px 3px 0 #000, 0 0 10px rgba(241,196,15,0.5); margin-bottom: 50px; text-align: center; }
        .title-menu { width: 80%; max-width: 300px; }
        
        /* ステータスバー */
        .status-bar { font-family: var(--font-main); display: flex; flex-direction: column; font-weight: bold; font-size: 16px; letter-spacing: 1px; padding: 15px 20px; }
        .status-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .status-bottom { display: flex; justify-content: space-between; color: var(--romasaga-cyan); font-size: 14px; }

        /* タブメニュー（名称変更） */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; padding: 15px 10px; margin-bottom: 20px; }
        .cmd-btn {
            background: rgba(0,0,51,0.8); color: #fff; border: 2px solid #555; font-family: var(--font-main);
            font-size: 15px; text-align: center; cursor: pointer; padding: 10px 2px; position: relative;
        }
        .cmd-btn:hover, .cmd-btn.active { color: var(--romasaga-gold-light); border-color: #fff; box-shadow: 0 0 0 2px #000; }

        .hirameki-effect {
            font-size: 24px; color: #fff; text-shadow: 0 0 10px #f1c40f, 0 0 20px #f1c40f;
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            animation: popup 1s ease-out forwards; pointer-events: none; z-index: 10;
        }
        @keyframes popup { 0% { top: 0px; opacity: 1; transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.5); } 100% { top: -40px; opacity: 0; transform: translateX(-50%) scale(1); } }
        @keyframes blink { 50% { opacity: 0; } }

        .word-title { font-size: 40px; font-weight: bold; text-align: center; margin: 10px 0 20px 0; color: var(--romasaga-gold-light); letter-spacing: 2px; }
        
        .explanation { display: none; margin-top: 15px; }
        .meaning-main { font-size: 22px; color: #fff; font-weight: bold; text-align: center; margin-bottom: 20px; border-bottom: 2px dashed #fff; padding-bottom: 10px; }
        .detail-section { background: rgba(0, 0, 0, 0.5); padding: 10px; border: 1px solid #555; margin-bottom: 10px; font-size: 14px; line-height: 1.6; }
        .section-title { color: var(--romasaga-cyan); margin-bottom: 5px; font-size: 15px; }
        .example-text { color: #bdc3c7; }

        /* ▼▼▼ クイズ選択肢（フォント小さめ＆ロマサガ枠） ▼▼▼ */
        .quiz-option { 
            display: block; width: 100%; background: #000033; color: #fff; 
            border: 2px solid #fff; box-shadow: 0 0 0 2px #000; 
            padding: 12px 10px 12px 30px; margin-bottom: 12px; 
            font-family: var(--font-main); font-size: 14px; /* 文字を小さく調整 */
            cursor: pointer; text-align: left; transition: 0.2s; position: relative;
        }
        .quiz-option::before { content: ""; position: absolute; left: 8px; top: 12px; }
        .quiz-option:hover { border-color: var(--romasaga-gold-light); color: var(--romasaga-gold-light); }
        .quiz-option:hover::before { content: "▶"; animation: blink 1s infinite; color: var(--romasaga-gold-light); }
        .quiz-option:disabled { cursor: not-allowed; }
        .quiz-option.correct { border-color: var(--romasaga-gold-light); color: var(--romasaga-gold-light); }
        .quiz-option.wrong { border-color: #e74c3c; color: #e74c3c; text-decoration: line-through; opacity: 0.7; }

        .action-btn { background: #fff; color: #000; border: 2px solid #000; box-shadow: 0 0 0 2px #fff; padding: 12px 20px; font-family: var(--font-main); font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; margin-bottom: 10px; text-shadow: none; }
        .action-btn:hover { background: #ddd; }
        
        #quiz-result { text-align: center; font-size: 24px; font-weight: bold; margin: 15px 0; }
        .dungeon-progress { text-align: center; color: var(--romasaga-cyan); margin-bottom: 10px; font-size: 16px; border-bottom: 1px solid #555; padding-bottom: 10px; }
        
        /* ダンジョン選択画面リスト */
        .dungeon-select-btn { 
            color: #fff; background: transparent; padding: 15px 10px; font-family: var(--font-main); 
            font-size: 18px; cursor: pointer; border-bottom: 1px dashed #555; transition: 0.2s; position: relative; padding-left: 35px;
        }
        .dungeon-select-btn::before { content: ""; position: absolute; left: 10px; top: 15px; }
        .dungeon-select-btn:hover { color: var(--romasaga-gold-light); }
        .dungeon-select-btn:hover::before { content: "▶"; animation: blink 1s infinite; }

        .record-item { background: rgba(0,0,0,0.6); border: 1px solid #555; padding: 10px; margin-bottom: 10px; }
        .record-header { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .record-bar-bg { width: 100%; background: #222; height: 10px; border: 1px solid #000; margin-top: 5px; position: relative; }
        .record-bar-fill { height: 100%; background: var(--romasaga-gold); position: absolute; left: 0; top: 0; }
        
        .hidden { display: none !important; }
        #loading-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 20px; z-index: 1000; }
    </style>
</head>
<body>

<div id="loading-view">
    <div id="loading-text">魔導書を読み込み中...</div>
    <div id="error-msg"></div>
</div>

<div id="title-screen" class="hidden">
    <div class="game-title">英単語サ・ガ<br><span style="font-size: 24px;">〜大学入試編〜</span></div>
    <div class="window title-menu">
        <button class="action-btn" onclick="startGame(true)">最初から</button>
        <button id="btn-continue" class="action-btn hidden" onclick="startGame(false)">続きから</button>
    </div>
</div>

<div class="container hidden" id="main-content">
    <div class="window status-bar">
        <div class="status-top">
            <div id="player-level">LV 1</div>
            <div id="player-exp">EXP 0 / 711</div>
        </div>
        <div class="status-bottom">
            <div id="player-class">称号: 見習い兵</div>
            <div id="player-combo">0 連撃</div>
        </div>
    </div>

    <div class="menu-grid">
        <button id="tab-flashcard" class="cmd-btn active" onclick="switchMode('flashcard')">スキル</button>
        <button id="tab-quiz" class="cmd-btn" onclick="switchMode('quiz')">特訓</button>
        <button id="tab-dungeon" class="cmd-btn" onclick="switchMode('dungeon-select')">討伐</button>
        <button id="tab-record" class="cmd-btn" onclick="switchMode('record')">記録</button>
    </div>

    <div class="window">
        <div class="mode-header">
            <div id="ui-mode-title" class="mode-title-text">スキル習得</div>
            <div id="ui-mode-desc" class="mode-desc-text">単語をタップして情報を解析し、知識をインプットせよ。</div>
        </div>

        <div id="flashcard-area">
            <p style="text-align: center; font-size: 12px; color: #aaa; margin: 0;">▼ タップして情報を解析</p>
            <div id="fc-word-container" style="position: relative;">
                <div id="fc-word" class="word-title" onclick="flipCard()" style="cursor: pointer;">Word</div>
            </div>
            <div id="fc-explanation" class="explanation">
                <div id="fc-meaning" class="meaning-main">Meaning</div>
                <div class="detail-section" id="box-fc-detail"><div class="section-title">【解説・ニュアンス】</div><div id="fc-detail"></div></div>
                <div class="detail-section" id="box-fc-usage"><div class="section-title">【構文・例文】</div><div id="fc-usage" style="margin-bottom: 5px; color: #fff;"></div><div id="fc-example" class="example-text"></div></div>
            </div>
            <button class="action-btn" onclick="nextFlashcard()">次のターゲットへ</button>
        </div>

        <div id="quiz-area" class="hidden">
            <div id="dungeon-progress" class="dungeon-progress hidden">第 1 階層 / 全 20 階層</div>
            <div id="quiz-word-container" style="position: relative;">
                <div id="quiz-word" class="word-title">Word</div>
            </div>
            <div id="quiz-options"></div>
            <div id="quiz-result"></div>
            
            <div id="quiz-explanation-box" class="explanation" style="border: none; padding-top: 0;">
                <div id="quiz-meaning" class="meaning-main">Meaning</div>
                <div class="detail-section" id="box-quiz-detail"><div class="section-title">【解説・ニュアンス】</div><div id="quiz-detail"></div></div>
                <div class="detail-section" id="box-quiz-usage"><div class="section-title">【構文・例文】</div><div id="quiz-usage" style="margin-bottom: 5px; color: #fff;"></div><div id="quiz-example" class="example-text"></div></div>
            </div>
            <button id="btn-next-quiz" class="action-btn hidden" onclick="nextQuiz()">次のコマンドへ</button>
        </div>

        <div id="dungeon-select-area" class="hidden">
            <div style="display: flex; flex-direction: column; padding: 10px 0;">
                <div class="dungeon-select-btn" onclick="startDungeon(20)">ゴブリンの洞窟 (20問)</div>
                <div class="dungeon-select-btn" onclick="startDungeon(30)">魔術師の塔 (30問)</div>
                <div class="dungeon-select-btn" onclick="startDungeon(50)">七英雄の迷宮 (50問)</div>
            </div>
        </div>

        <div id="dungeon-result-area" class="hidden" style="text-align: center;">
            <div style="font-size: 20px; margin: 20px 0;">
                討伐数: <span id="res-correct" style="color: #66ccff; font-size: 28px;">0</span> / <span id="res-total">0</span> 体
            </div>
            <div style="font-size: 24px; margin-bottom: 20px;">
                討伐率: <span id="res-rate" style="color: var(--romasaga-gold-light); font-size: 36px;">0%</span>
            </div>
            <div style="background: rgba(0,0,0,0.5); padding: 15px; border: 1px solid #555; margin-bottom: 20px;">
                <div style="font-size: 14px; color: #aaa;">特別討伐報酬</div>
                <div style="font-size: 24px; color: #f1c40f;">+ <span id="res-exp">0</span> EXP</div>
            </div>
            <button class="action-btn" onclick="switchMode('record')">討伐記録を確認する</button>
            <button class="action-btn" style="background: #000; color: #fff; border-color: #555;" onclick="switchMode('dungeon-select')">別のダンジョンへ</button>
        </div>

        <div id="record-area" class="hidden">
            <div id="record-list"></div>
        </div>
    </div>

</div>

<script>
    let words = []; 
    let currentWordIndex = 0;
    
    // セーブデータ用変数
    let playerExp = 0;
    let playerLevel = 1;
    let comboCount = 0;
    let dungeonHistory = [];
    const nextLevelExp = 711;

    // 称号リスト（全31種類）
    const titles = [
        { lv: 1, name: "見習い兵" }, { lv: 2, name: "帝国軽歩兵" }, { lv: 3, name: "帝国重装歩兵" },
        { lv: 4, name: "帝国猟兵" }, { lv: 5, name: "宮廷魔術師" }, { lv: 6, name: "フリーファイター" },
        { lv: 7, name: "フリーメイジ" }, { lv: 8, name: "シティシーフ" }, { lv: 9, name: "サイゴ族" },
        { lv: 10, name: "格闘家" }, { lv: 11, name: "武装商船団" }, { lv: 12, name: "ノーマッド" },
        { lv: 13, name: "デザートガード" }, { lv: 14, name: "アマゾネス" }, { lv: 15, name: "海女" },
        { lv: 16, name: "ホーリーオーダー" }, { lv: 18, name: "サラマンダー" }, { lv: 20, name: "モール" },
        { lv: 22, name: "ネレイド" }, { lv: 24, name: "イーリス" }, { lv: 26, name: "陰陽師" },
        { lv: 28, name: "忍者" }, { lv: 30, name: "イーストガード" }, { lv: 35, name: "インペリアルガード" },
        { lv: 40, name: "帝国将軍" }, { lv: 50, name: "伝説の英雄" }, { lv: 60, name: "七英雄の好敵手" },
        { lv: 70, name: "皇帝" }, { lv: 80, name: "真・皇帝" }, { lv: 90, name: "アバロンの導き手" },
        { lv: 99, name: "最終皇帝" }
    ];

    const SAVE_KEY = 'saga_save_data';

    function saveGame() {
        const saveData = { level: playerLevel, exp: playerExp, combo: comboCount, history: dungeonHistory };
        localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
    }

    function loadGameData() {
        const dataStr = localStorage.getItem(SAVE_KEY);
        if (dataStr) {
            const data = JSON.parse(dataStr);
            playerLevel = data.level || 1; playerExp = data.exp || 0; comboCount = data.combo || 0; dungeonHistory = data.history || [];
            return true;
        }
        return false;
    }

    function startGame(isNewGame) {
        if (isNewGame) {
            if(confirm("以前のセーブデータは消えますが、よろしいですか？")) {
                playerLevel = 1; playerExp = 0; comboCount = 0; dungeonHistory = []; saveGame();
            } else { return; }
        } else { loadGameData(); }
        document.getElementById('title-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        updateStatus();
        switchMode('flashcard');
    }

    async function loadWordsData() {
        try {
            const response = await fetch('words.json?' + new Date().getTime());
            if (!response.ok) throw new Error("HTTPエラー: " + response.status + " (words.jsonが見つかりません)");
            const textData = await response.text();
            try { words = JSON.parse(textData); } catch(e) { throw new Error("words.json の形式が正しくありません。"); }
            
            document.getElementById('loading-view').classList.add('hidden');
            document.getElementById('title-screen').classList.remove('hidden');
            if (localStorage.getItem(SAVE_KEY)) document.getElementById('btn-continue').classList.remove('hidden');
        } catch (error) {
            document.getElementById('loading-text').innerHTML = "<b>通信エラー</b>";
            document.getElementById('error-msg').innerHTML = error.message;
        }
    }

    let isDungeonMode = false;
    let dungeonTotal = 0;
    let dungeonCurrent = 0;
    let dungeonCorrect = 0;

    function getPlayerClass(lv) {
        let currentTitle = titles[0].name;
        for (let i = 0; i < titles.length; i++) { if (lv >= titles[i].lv) currentTitle = titles[i].name; }
        return currentTitle;
    }

    function updateStatus() {
        document.getElementById('player-level').innerText = "LV " + playerLevel;
        document.getElementById('player-exp').innerText = "EXP " + playerExp + " / " + nextLevelExp;
        document.getElementById('player-combo').innerText = comboCount + " 連撃中";
        document.getElementById('player-class').innerText = "称号: " + getPlayerClass(playerLevel);
        document.getElementById('player-combo').style.color = comboCount > 0 ? "var(--romasaga-gold-light)" : "var(--romasaga-cyan)";
    }

    function addExp(baseAmount) {
        let comboBonus = 1 + (Math.min(comboCount, 10) * 0.1); 
        let finalAmount = Math.floor(baseAmount * comboBonus);
        let oldClass = getPlayerClass(playerLevel);

        playerExp += finalAmount;
        while (playerExp >= nextLevelExp) { playerLevel++; playerExp -= nextLevelExp; }
        
        let newClass = getPlayerClass(playerLevel);
        if (oldClass !== newClass) alert(`レベルアップ！ LV ${playerLevel} になった！\nなんと「${newClass}」にクラスチェンジした！`);
        
        updateStatus(); saveGame();
    }

    function triggerHirameki(containerId) {
        const container = document.getElementById(containerId);
        const effect = document.createElement('div');
        effect.className = 'hirameki-effect'; effect.innerText = '💡ピコーン！';
        container.appendChild(effect);
        setTimeout(() => { effect.remove(); }, 1000);
    }

    // UIのモード説明文を管理するオブジェクト
    const modeInfo = {
        flashcard: { title: "スキル習得", desc: "単語をタップして情報を解析し、知識をインプットせよ。" },
        quiz: { title: "特訓（4択演習）", desc: "出題された単語に対し、正しい意味を4択から選んで答えよ。" },
        dungeon: { title: "ダンジョン討伐", desc: "連続で敵（単語）を倒し、討伐率に応じて莫大なEXPを獲得せよ。" },
        record: { title: "討伐記録", desc: "過去のダンジョン踏破記録と成長の軌跡を確認する。" }
    };

    function switchMode(mode, keepDungeonState = false) {
        if (!keepDungeonState && isDungeonMode && mode !== 'quiz') {
            if(!confirm("ダンジョン攻略を中断して退却しますか？")) return;
            isDungeonMode = false; document.getElementById('dungeon-progress').classList.add('hidden');
        }

        // タブのアクティブ状態リセット
        ['tab-flashcard', 'tab-quiz', 'tab-dungeon', 'tab-record'].forEach(id => document.getElementById(id).classList.remove('active'));
        // エリアの非表示
        ['flashcard-area', 'quiz-area', 'dungeon-select-area', 'dungeon-result-area', 'record-area'].forEach(id => document.getElementById(id).classList.add('hidden'));

        if (mode === 'flashcard') { 
            document.getElementById('tab-flashcard').classList.add('active'); 
            document.getElementById('flashcard-area').classList.remove('hidden'); 
            updateModeHeader('flashcard'); loadFlashcard(); 
        }
        else if (mode === 'quiz') { 
            document.getElementById('tab-quiz').classList.add('active'); 
            document.getElementById('quiz-area').classList.remove('hidden'); 
            updateModeHeader('quiz'); loadQuiz(); 
        }
        else if (mode === 'dungeon-select') { 
            document.getElementById('tab-dungeon').classList.add('active'); 
            document.getElementById('dungeon-select-area').classList.remove('hidden'); 
            updateModeHeader('dungeon'); 
        }
        else if (mode === 'record') { 
            document.getElementById('tab-record').classList.add('active'); 
            document.getElementById('record-area').classList.remove('hidden'); 
            updateModeHeader('record'); renderRecords(); 
        }
    }

    function updateModeHeader(modeKey) {
        document.getElementById('ui-mode-title').innerText = modeInfo[modeKey].title;
        document.getElementById('ui-mode-desc').innerText = modeInfo[modeKey].desc;
    }

    function setTextOrHide(elementId, boxId, text) {
        const el = document.getElementById(elementId); const box = document.getElementById(boxId);
        if (text && text.trim() !== "") { el.innerHTML = text; box.style.display = "block"; } else { box.style.display = "none"; }
    }

    function getRandomIndex() { return Math.floor(Math.random() * words.length); }

    function loadFlashcard() {
        if (words.length === 0) return;
        currentWordIndex = getRandomIndex();
        const wordData = words[currentWordIndex];
        
        document.getElementById('fc-word').innerText = wordData.en || "N/A";
        document.getElementById('fc-meaning').innerText = wordData.ja || "意味不明";
        setTextOrHide('fc-detail', 'box-fc-detail', wordData.detail);
        setTextOrHide('fc-usage', 'box-fc-usage', wordData.usage);
        
        const exEl = document.getElementById('fc-example');
        if (wordData.example && wordData.example.trim() !== "") { exEl.innerHTML = wordData.example; exEl.style.display = "block"; document.getElementById('box-fc-usage').style.display = "block"; } 
        else { exEl.style.display = "none"; }
        if(!wordData.usage && !wordData.example) document.getElementById('box-fc-usage').style.display = "none";
        
        document.getElementById('fc-explanation').style.display = 'none';
    }

    function flipCard() {
        const exp = document.getElementById('fc-explanation');
        exp.style.display = exp.style.display === 'none' ? 'block' : 'none';
    }

    function nextFlashcard() { addExp(5); loadFlashcard(); }

    function startDungeon(count) {
        if(words.length < 4) { alert("単語データが不足しています。"); return; }
        isDungeonMode = true; dungeonTotal = count; dungeonCurrent = 1; dungeonCorrect = 0;
        
        document.getElementById('tab-quiz').classList.remove('active');
        document.getElementById('tab-dungeon').classList.add('active');
        document.getElementById('dungeon-select-area').classList.add('hidden');
        document.getElementById('quiz-area').classList.remove('hidden');
        
        document.getElementById('dungeon-progress').classList.remove('hidden');
        updateDungeonProgress(); loadQuiz();
    }

    function updateDungeonProgress() { document.getElementById('dungeon-progress').innerText = `第 ${dungeonCurrent} 階層 / 全 ${dungeonTotal} 階層`; }

    function loadQuiz() {
        if (words.length === 0) return;
        currentWordIndex = getRandomIndex();
        const correctWord = words[currentWordIndex];
        
        document.getElementById('quiz-word').innerText = correctWord.en || "N/A";
        document.getElementById('quiz-result').innerText = '';
        document.getElementById('btn-next-quiz').classList.add('hidden');
        document.getElementById('quiz-explanation-box').style.display = 'none';

        let options = [correctWord.ja || "意味不明"];
        let wrongOptions = words.filter((w, index) => index !== currentWordIndex);
        wrongOptions.sort(() => Math.random() - 0.5);
        for(let i = 0; i < 3 && i < wrongOptions.length; i++) { options.push(wrongOptions[i].ja || "意味不明"); }
        options.sort(() => Math.random() - 0.5);

        const optionsContainer = document.getElementById('quiz-options');
        optionsContainer.innerHTML = '';
        options.forEach((optionText, index) => {
            const btn = document.createElement('button');
            btn.className = 'quiz-option'; btn.innerText = `${index + 1}. ${optionText}`; 
            btn.onclick = () => checkAnswer(optionText, correctWord, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedJa, correctWord, clickedBtn) {
        const resultDiv = document.getElementById('quiz-result');
        const allBtns = document.querySelectorAll('.quiz-option');
        allBtns.forEach(btn => btn.disabled = true);

        const correctJa = correctWord.ja || "意味不明";

        if (selectedJa === correctJa) {
            comboCount++; if (isDungeonMode) dungeonCorrect++;
            clickedBtn.classList.add('correct');
            
            if (Math.random() < 0.2 || comboCount % 5 === 0) {
                triggerHirameki('quiz-word-container'); resultDiv.innerText = '見事、閃いた！(EXP 3倍)'; addExp(90);
            } else {
                resultDiv.innerText = '見事、勝利！'; addExp(30);
            }
        } else {
            comboCount = 0;
            resultDiv.innerText = '敗北...。連撃が途切れた。'; resultDiv.style.color = '#e74c3c';
            clickedBtn.classList.add('wrong');
            
            allBtns.forEach(btn => { if(btn.innerText.includes(correctJa)) btn.classList.add('correct'); });
            saveGame(); updateStatus();
        }

        document.getElementById('quiz-meaning').innerText = correctJa;
        setTextOrHide('quiz-detail', 'box-quiz-detail', correctWord.detail);
        setTextOrHide('quiz-usage', 'box-quiz-usage', correctWord.usage);
        
        const exEl = document.getElementById('quiz-example');
        if (correctWord.example && correctWord.example.trim() !== "") { exEl.innerHTML = correctWord.example; exEl.style.display = "block"; document.getElementById('box-quiz-usage').style.display = "block"; } 
        else { exEl.style.display = "none"; }
        if(!correctWord.usage && !correctWord.example) document.getElementById('box-quiz-usage').style.display = "none";

        document.getElementById('quiz-explanation-box').style.display = 'block';
        
        const nextBtn = document.getElementById('btn-next-quiz');
        if (isDungeonMode && dungeonCurrent >= dungeonTotal) { nextBtn.innerText = "ダンジョン結果へ"; } 
        else { nextBtn.innerText = "次のコマンドへ"; }
        nextBtn.classList.remove('hidden');
    }

    function nextQuiz() { 
        if (isDungeonMode) {
            if (dungeonCurrent >= dungeonTotal) { finishDungeon(); } 
            else { dungeonCurrent++; updateDungeonProgress(); loadQuiz(); }
        } else { loadQuiz(); }
    }

    function finishDungeon() {
        isDungeonMode = false;
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('dungeon-progress').classList.add('hidden');
        document.getElementById('dungeon-result-area').classList.remove('hidden');
        updateModeHeader('dungeon'); // ヘッダーを討伐結果用の文言に戻す

        let rate = Math.floor((dungeonCorrect / dungeonTotal) * 100);
        let bonusExp = Math.floor((rate / 100) * dungeonTotal * 50);
        
        document.getElementById('res-correct').innerText = dungeonCorrect;
        document.getElementById('res-total').innerText = dungeonTotal;
        document.getElementById('res-rate').innerText = rate + "%";
        
        const rateEl = document.getElementById('res-rate');
        if (rate >= 80) rateEl.style.color = "var(--romasaga-gold-light)";
        else if (rate >= 50) rateEl.style.color = "#fff";
        else rateEl.style.color = "#e74c3c";

        document.getElementById('res-exp').innerText = bonusExp;

        const now = new Date();
        const dateStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
        dungeonHistory.unshift({ date: dateStr, total: dungeonTotal, rate: rate, exp: bonusExp });
        if(dungeonHistory.length > 20) dungeonHistory.pop();
        
        addExp(bonusExp); saveGame();
    }

    function renderRecords() {
        const listContainer = document.getElementById('record-list');
        listContainer.innerHTML = '';

        if (dungeonHistory.length === 0) {
            listContainer.innerHTML = '<p style="color: #aaa; text-align: center; margin-top: 20px;">まだ討伐記録がありません。<br>ダンジョンに挑戦して歴史を刻みましょう。</p>'; return;
        }

        dungeonHistory.forEach(record => {
            const item = document.createElement('div');
            item.className = 'record-item';
            let barColor = "var(--romasaga-gold)";
            if (record.rate < 50) barColor = "#e74c3c"; else if (record.rate < 80) barColor = "var(--romasaga-cyan)";
            let typeName = record.total === 20 ? "ゴブリンの洞窟" : record.total === 30 ? "魔術師の塔" : "七英雄の迷宮";

            item.innerHTML = `
                <div class="record-header"><span>📅 ${record.date}</span><span style="color: #fff;">${typeName} (${record.total}問)</span></div>
                <div style="font-size: 14px; text-align: right;">獲得EXP: <span style="color: #f1c40f;">+${record.exp}</span></div>
                <div class="record-bar-bg"><div class="record-bar-fill" style="width: ${record.rate}%; background: ${barColor};"></div></div>
                <div style="text-align: right; font-size: 10px; margin-top: 2px;">討伐率 ${record.rate}%</div>
            `;
            listContainer.appendChild(item);
        });
    }

    window.onload = loadWordsData;
</script>
</body>
</html>
