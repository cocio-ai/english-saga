<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英単語サ・ガ：大学入試編</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=PixelMplus10&display=swap" rel="stylesheet">
    <style>
        /* ロマサガ風スタイル */
        :root {
            --romasaga-blue-dark: #000033;
            --romasaga-blue-light: #000080;
            --romasaga-gold: #daa520; /* 金色 */
            --romasaga-gold-light: #f1c40f; /* 鮮やかな金色 */
            --romasaga-cyan: #87ceeb; /* 水色（解説用） */
            --romasaga-border-width: 2px;
            
            /* フォント設定 */
            --font-main: 'PixelMplus10', sans-serif; /* 日本語 */
            --font-word: 'DotGothic16', sans-serif; /* 英単語 */
        }

        body {
            font-family: var(--font-main);
            background-color: #000;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 10px;
            image-rendering: pixelated; /* ドット絵をくっきり表示 */
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* ロマサガ風ウィンドウ（多重枠） */
        .window {
            background-color: var(--romasaga-blue-dark);
            border: var(--romasaga-border-width) solid #fff; /* 白の内枠 */
            box-shadow: 0 0 0 2px #000, 0 0 0 4px var(--romasaga-gold), inset 0 0 10px rgba(255, 255, 255, 0.2);
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
            position: relative;
        }

        /* ステータスバー（画面上部） */
        .status-bar {
            font-family: var(--font-word); /* ステータスは英語風フォント */
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 2px;
            padding: 10px 15px;
        }

        /* コマンドメニュー（タブ） */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .cmd-btn {
            background: transparent;
            color: #fff;
            border: none;
            font-family: var(--font-main);
            font-size: 18px;
            text-align: left;
            cursor: pointer;
            padding: 10px;
            position: relative;
        }
        .cmd-btn:hover, .cmd-btn.active {
            color: var(--romasaga-gold-light);
            text-shadow: 0 0 5px #fff;
        }
        .cmd-btn.active::before {
            content: "▶ ";
            position: absolute;
            left: -10px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* 英単語表示（戦闘画面の敵の名前風） */
        .word-title {
            font-family: var(--font-word);
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: var(--romasaga-gold-light);
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #000;
        }
        
        /* 詳細解説エリア */
        .explanation {
            display: none;
            margin-top: 15px;
        }
        .meaning-main {
            font-size: 24px;
            color: #fff;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px dashed var(--romasaga-gold);
            padding-bottom: 10px;
        }
        .detail-section {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.6;
        }
        .section-title {
            color: var(--romasaga-cyan); /* ロマサガの解説文でよく使われる水色 */
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 15px;
        }
        .example-text {
            color: #bdc3c7;
            font-style: italic;
        }

        /* クイズの選択肢（コマンドメニュー風） */
        .quiz-option {
            display: block;
            width: 100%;
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 12px;
            margin-bottom: 8px;
            font-family: var(--font-main);
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
            position: relative;
        }
        .quiz-option:hover {
            border-color: var(--romasaga-gold-light);
            color: var(--romasaga-gold-light);
            background: rgba(255, 255, 255, 0.1);
        }
        .quiz-option:disabled { cursor: not-allowed; }

        /* 汎用アクションボタン（「決定」ボタン風） */
        .action-btn {
            background: #fff;
            color: #000;
            border: 2px solid #aaa;
            padding: 10px 20px;
            font-family: var(--font-main);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .action-btn:hover { background: #ddd; }
        
        /* 結果表示 */
        #quiz-result {
            font-family: var(--font-main);
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin: 15px 0;
            text-shadow: 2px 2px 0 #000;
        }
        
        .hidden { display: none !important; }
        #loading-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; display: flex; justify-content: center;
            align-items: center; font-size: 24px; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="loading-view">データをロード中...</div>

<div class="container hidden" id="main-content">
    <div class="window status-bar">
        <div id="player-level">LV 1</div>
        <div id="player-exp">EXP 0 / 711</div>
    </div>

    <div class="window menu-grid">
        <button id="tab-flashcard" class="cmd-btn active" onclick="switchMode('flashcard')">単語カード</button>
        <button id="tab-quiz" class="cmd-btn" onclick="switchMode('quiz')">４択クイズ</button>
    </div>

    <div id="flashcard-area" class="window">
        <p style="text-align: center; font-size: 12px; color: #aaa; margin: 0;">▼ タップして情報を解析</p>
        <div id="fc-word" class="word-title" onclick="flipCard()" style="cursor: pointer;">Word</div>
        
        <div id="fc-explanation" class="explanation">
            <div id="fc-meaning" class="meaning-main">Meaning</div>
            
            <div class="detail-section">
                <div class="section-title">【解説・ニュアンス】</div>
                <div id="fc-detail">Detail text</div>
            </div>
            
            <div class="detail-section">
                <div class="section-title">【構文・例文】</div>
                <div id="fc-usage" style="margin-bottom: 5px; font-weight: bold; color: #fff;">Usage</div>
                <div id="fc-example" class="example-text">Example</div>
            </div>
        </div>
        <button class="action-btn" onclick="nextFlashcard()">次のターゲットへ</button>
    </div>

    <div id="quiz-area" class="window hidden">
        <div id="quiz-word" class="word-title">Word</div>
        <div id="quiz-options"></div>
        <div id="quiz-result"></div>
        
        <div id="quiz-explanation-box" class="explanation" style="display: none; border: none; padding-top: 0;">
            <div id="quiz-meaning" class="meaning-main">Meaning</div>
            <div class="detail-section">
                <div class="section-title">【解説・ニュアンス】</div>
                <div id="quiz-detail">Detail</div>
            </div>
            <div class="detail-section">
                <div class="section-title">【構文・例文】</div>
                <div id="quiz-usage" style="margin-bottom: 5px; font-weight: bold; color: #fff;">Usage</div>
                <div id="quiz-example" class="example-text">Example</div>
            </div>
        </div>

        <button id="btn-next-quiz" class="action-btn hidden" onclick="nextQuiz()">次のコマンドへ</button>
    </div>
</div>

<script>
    // --- グローバル変数 ---
    let words = []; // 単語データ（JSONからロード）
    let currentWordIndex = 0;
    let playerExp = 0;
    let playerLevel = 1;
    const nextLevelExp = 711; // ロマサガ1の最大HPリスペクト

    // --- データロード機能 ---
    async function loadWordsData() {
        try {
            const response = await fetch('words.json'); // words.jsonファイルをフェッチ
            if (!response.ok) throw new Error('ネットワーク応答が正常ではありません');
            words = await response.json(); // JSONとして解析
            
            if (words.length < 4) {
                alert("エラー：クイズを作成するには、words.jsonに少なくとも4つの単語が必要です。");
                return;
            }

            // ロード完了後の初期化
            document.getElementById('loading-view').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            loadFlashcard();
            updateStatus();
        } catch (error) {
            console.error('データの読み込みに失敗しました:', error);
            document.getElementById('loading-view').innerText = "エラー: words.json が見つからないか、形式が正しくありません。";
        }
    }

    // --- ゲームシステム ---
    function updateStatus() {
        document.getElementById('player-level').innerText = "LV " + playerLevel;
        document.getElementById('player-exp').innerText = "EXP " + playerExp + " / " + nextLevelExp;
    }

    function addExp(amount) {
        playerExp += amount;
        if (playerExp >= nextLevelExp) {
            playerLevel++;
            playerExp = playerExp - nextLevelExp;
            alert("レベルアップ！ 力がみなぎってきた！ LV " + playerLevel + " になりました！");
        }
        updateStatus();
    }

    // --- 共通機能 ---
    function getRandomIndex() { return Math.floor(Math.random() * words.length); }

    function switchMode(mode) {
        document.getElementById('tab-flashcard').classList.remove('active');
        document.getElementById('tab-quiz').classList.remove('active');
        document.getElementById('flashcard-area').classList.add('hidden');
        document.getElementById('quiz-area').classList.add('hidden');

        if (mode === 'flashcard') {
            document.getElementById('tab-flashcard').classList.add('active');
            document.getElementById('flashcard-area').classList.remove('hidden');
            loadFlashcard();
        } else {
            document.getElementById('tab-quiz').classList.add('active');
            document.getElementById('quiz-area').classList.remove('hidden');
            loadQuiz();
        }
    }

    // --- 単語カード機能 ---
    function loadFlashcard() {
        if (words.length === 0) return;
        currentWordIndex = getRandomIndex();
        const wordData = words[currentWordIndex];
        
        document.getElementById('fc-word').innerText = wordData.en;
        document.getElementById('fc-meaning').innerText = wordData.ja;
        document.getElementById('fc-detail').innerHTML = wordData.detail;
        document.getElementById('fc-usage').innerText = wordData.usage;
        document.getElementById('fc-example').innerHTML = wordData.example;
        
        document.getElementById('fc-explanation').style.display = 'none'; // 裏面を隠す
    }

    function flipCard() {
        const exp = document.getElementById('fc-explanation');
        exp.style.display = exp.style.display === 'none' ? 'block' : 'none';
    }

    function nextFlashcard() { 
        addExp(10); // カードを解析して次へ行くたびに経験値付与
        loadFlashcard(); 
    }

    // --- 4択クイズ機能 ---
    function loadQuiz() {
        if (words.length === 0) return;
        currentWordIndex = getRandomIndex();
        const correctWord = words[currentWordIndex];
        
        document.getElementById('quiz-word').innerText = correctWord.en;
        document.getElementById('quiz-result').innerText = '';
        document.getElementById('quiz-result').style.color = '#fff';
        document.getElementById('btn-next-quiz').classList.add('hidden');
        document.getElementById('quiz-explanation-box').style.display = 'none';

        let options = [correctWord.ja];
        let wrongOptions = words.filter((w, index) => index !== currentWordIndex);
        
        wrongOptions.sort(() => Math.random() - 0.5);
        for(let i = 0; i < 3 && i < wrongOptions.length; i++) {
            options.push(wrongOptions[i].ja);
        }
        options.sort(() => Math.random() - 0.5);

        const optionsContainer = document.getElementById('quiz-options');
        optionsContainer.innerHTML = '';
        options.forEach(optionText => {
            const btn = document.createElement('button');
            btn.className = 'quiz-option';
            btn.innerText = "▶ " + optionText;
            btn.onclick = () => checkAnswer(optionText, correctWord, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedJa, correctWord, clickedBtn) {
        const resultDiv = document.getElementById('quiz-result');
        const allBtns = document.querySelectorAll('.quiz-option');
        allBtns.forEach(btn => btn.disabled = true);

        if (selectedJa === correctWord.ja) {
            resultDiv.innerText = '見事、勝利！';
            resultDiv.style.color = var(--romasaga-gold-light); 
            clickedBtn.style.borderColor = 'var(--romasaga-gold-light)';
            clickedBtn.style.color = 'var(--romasaga-gold-light)';
            clickedBtn.style.backgroundColor = 'rgba(218, 165, 32, 0.2)'; // 薄い金色 backgrounds
            addExp(30); // 勝利で多めに経験値付与
        } else {
            resultDiv.innerText = '敗北...。次は負けん！';
            resultDiv.style.color = '#e74c3c'; // 赤
            clickedBtn.style.borderColor = '#e74c3c';
            clickedBtn.style.color = '#e74c3c';
            clickedBtn.style.backgroundColor = 'rgba(231, 76, 60, 0.2)';
            
            // 正解のボタンを金色にする
            allBtns.forEach(btn => {
                if(btn.innerText === "▶ " + correctWord.ja) {
                    btn.style.borderColor = 'var(--romasaga-gold-light)';
                    btn.style.color = 'var(--romasaga-gold-light)';
                }
            });
        }

        // 解析情報を表示（クイズ用）
        document.getElementById('quiz-meaning').innerText = correctWord.ja;
        document.getElementById('quiz-detail').innerHTML = correctWord.detail;
        document.getElementById('quiz-usage').innerText = correctWord.usage;
        document.getElementById('quiz-example').innerHTML = correctWord.example;
        document.getElementById('quiz-explanation-box').style.display = 'block';

        document.getElementById('btn-next-quiz').classList.remove('hidden');
    }

    function nextQuiz() { loadQuiz(); }

    // 初期化：データをロード
    window.onload = loadWordsData;
</script>

</body>
</html>
